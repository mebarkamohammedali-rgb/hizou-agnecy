<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIZOU Agency</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --font-arabic: 'Cairo', sans-serif;
        --font-french-display: 'Bebas Neue', sans-serif;
        --font-french-body: 'DM Sans', sans-serif;
      }

      html, body, * {
        font-family: var(--font-arabic) !important;
        font-style: normal !important;
      }

      /* French Version Styles */
      html.lang-fr, html.lang-fr body, html.lang-fr * {
        font-family: var(--font-french-body) !important;
        font-weight: 500;
      }

      html.lang-fr h1, html.lang-fr h2 {
        font-family: var(--font-french-display) !important;
        letter-spacing: 3px !important;
      }

      html.lang-fr button, html.lang-fr .btn-french {
        font-family: var(--font-french-display) !important;
        letter-spacing: 2px !important;
        font-size: 16px !important;
      }
    </style>
    <script>
      (function() {
        const originalFetch = window.fetch;
        if (!originalFetch) return;

        try {
          // We define a property with both a getter and a setter.
          // The setter will simply ignore any attempts to overwrite fetch,
          // thus preventing the "only a getter" TypeError.
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(v) {
              console.warn('Blocked attempt to overwrite window.fetch with:', v);
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define fetch proxy:', e);
          // Fallback: try to make it writable if the above failed
          try {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true
            });
          } catch (err) {
            console.error('window.fetch is strictly non-configurable.');
          }
        }
      })();
    </script>
  </head>
  <body>
    <!-- PRELOADER -->
    <div id="preloader" style="
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    ">
      <!-- الفراشة البرتقالية SVG -->
      <svg width="200" height="200" viewBox="0 0 100 100" 
           id="butterfly"
           style="animation: flutter 0.8s ease-in-out infinite alternate;">
        <defs>
          <!-- شكل الفراشة كـ mask -->
          <clipPath id="butterfly-clip">
            <path d="M50 50 C30 20, 0 10, 5 40 C10 60, 35 65, 50 50Z"/>
            <path d="M50 50 C70 20, 100 10, 95 40 C90 60, 65 65, 50 50Z"/>
            <path d="M50 50 C25 60, 5 80, 15 90 C30 100, 45 75, 50 50Z"/>
            <path d="M50 50 C75 60, 95 80, 85 90 C70 100, 55 75, 50 50Z"/>
          </clipPath>
        </defs>

        <!-- الفراشة فارغة (outline فقط) -->
        <path d="M50 50 C30 20, 0 10, 5 40 C10 60, 35 65, 50 50Z" 
              fill="none" stroke="#F07020" stroke-width="1.5" opacity="0.3"/>
        <path d="M50 50 C70 20, 100 10, 95 40 C90 60, 65 65, 50 50Z" 
              fill="none" stroke="#F07020" stroke-width="1.5" opacity="0.3"/>
        <path d="M50 50 C25 60, 5 80, 15 90 C30 100, 45 75, 50 50Z" 
              fill="none" stroke="#F07020" stroke-width="1.5" opacity="0.3"/>
        <path d="M50 50 C75 60, 95 80, 85 90 C70 100, 55 75, 50 50Z" 
              fill="none" stroke="#F07020" stroke-width="1.5" opacity="0.3"/>

        <!-- التعبئة البرتقالية تملأ من الأسفل للأعلى -->
        <g clip-path="url(#butterfly-clip)">
          <rect id="fill-rect" 
                x="0" y="100" width="100" height="100" 
                fill="#F07020"/>
        </g>

        <!-- الجسم -->
        <ellipse cx="50" cy="55" rx="2.5" ry="16" fill="#F07020"/>
      </svg>

      <!-- نسبة التحميل -->
      <div id="progress-text" style="
        color: #666;
        font-family: Cairo, sans-serif;
        font-size: 12px;
        margin-top: 24px;
        letter-spacing: 3px;
        opacity: 0.7;
      ">0%</div>
    </div>

    <style>
    @keyframes flutter {
      0%   { transform: scaleY(1) rotate(-5deg); }
      100% { transform: scaleY(0.85) rotate(5deg); }
    }
    </style>

    <script>
      // محاكاة التحميل
      (function() {
        let progress = 0;
        const fillRect = document.getElementById('fill-rect');
        const text = document.getElementById('progress-text');
        const loader = document.getElementById('preloader');

        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            setTimeout(() => {
              if (loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
              }
            }, 300);
          }
          if (fillRect) {
            const newY = 100 - progress;
            fillRect.setAttribute('y', newY);
          }
          if (text) text.textContent = Math.floor(progress) + '%';
        }, 120);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
